name: Build Flatpak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak flatpak-builder
          flatpak --version
          flatpak-builder --version

      - name: Configure Flathub remote
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --noninteractive flathub org.kde.Platform//6.7 org.kde.Sdk//6.7

      - name: Build Flatpak
        run: |
          sudo flatpak-builder \
            --force-clean \
            --ccache \
            --install-deps-from=flathub \
            --repo=repo \
            --subject="Built from ${{ github.sha }}" \
            build-dir \
            com.github.tomohiron907.Strecs3D.yml

      - name: Build bundle
        run: |
          sudo flatpak build-bundle repo Strecs3D.flatpak com.github.tomohiron907.Strecs3D

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strecs3D-x86_64
          path: Strecs3D.flatpak
          retention-days: 30

  release:
    name: Create Release
    needs: [flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Strecs3D-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Strecs3D Flatpak ${{ github.ref_name }}
          body: |
            Flatpak build of Strecs3D ${{ github.ref_name }}

            ## Installation
            ```bash
            flatpak install Strecs3D.flatpak
            ```

            ## Running
            ```bash
            flatpak run com.github.tomohiron907.Strecs3D
            ```
          files: Strecs3D.flatpak
          generate_release_notes: true
