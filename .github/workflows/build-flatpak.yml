name: Build Flatpak

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream Strecs3D tag (e.g. v2.0.0)'
        required: false

permissions:
  contents: write
  actions: read

jobs:
  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prep.outputs.version }}
      upstream_changelog: ${{ steps.prep.outputs.upstream_changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: prep
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Tag push: strip 'v' prefix
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            # Manual dispatch: use input, strip 'v' if present
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
          else
            # Normal push/PR: use dev version with short SHA
            VERSION="dev-$(echo $GITHUB_SHA | cut -c1-7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          DATE=$(date +%Y-%m-%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION (date: $DATE)"

      - name: Inject version into manifest
        run: |
          sed -i "s/@@VERSION@@/${{ steps.prep.outputs.version }}/g" com.github.tomohiron907.Strecs3D.yml
          sed -i "s/@@DATE@@/${{ steps.prep.outputs.date }}/g" com.github.tomohiron907.Strecs3D.yml

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak flatpak-builder
          flatpak --version
          flatpak-builder --version

      - name: Configure Flathub remote
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install --noninteractive flathub org.kde.Platform//6.7 org.kde.Sdk//6.7

      - name: Build Flatpak
        run: |
          sudo flatpak-builder \
            --force-clean \
            --ccache \
            --install-deps-from=flathub \
            --repo=repo \
            --subject="Streics3D ${{ steps.prep.outputs.version }}" \
            build-dir \
            com.github.tomohiron907.Strecs3D.yml

      - name: Build bundle
        run: |
          sudo flatpak build-bundle repo Strecs3D.flatpak com.github.tomohiron907.Strecs3D

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strecs3D-x86_64
          path: Strecs3D.flatpak
          retention-days: 30

  release:
    name: Create Release
    needs: [flatpak]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Strecs3D-x86_64

      - name: Fetch upstream release notes
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Fetch release info from upstream repo
          RELEASE=$(gh api repos/tomohiron907/Strecs3D/releases/tags/$TAG --jq '{body: .body, url: .html_url}' 2>/dev/null || echo '{"body":"","url":""}')
          BODY=$(echo "$RELEASE" | jq -r '.body')
          URL=$(echo "$RELEASE" | jq -r '.url')
          if [ -n "$BODY" ] && [ "$BODY" != "null" ]; then
            {
              echo "changelog<<EOF"
              echo "## Upstream Changes ($TAG)"
              echo ""
              echo "$BODY"
              echo ""
              echo "[View on GitHub]($URL)"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changelog=No upstream release notes found." >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Strecs3D Flatpak ${{ github.ref_name }}
          body: |
            Flatpak build of [Strecs3D](https://github.com/tomohiron907/Strecs3D) **${{ github.ref_name }}**.

            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            ```bash
            flatpak install Strecs3D.flatpak
            ```

            ## Running
            ```bash
            flatpak run com.github.tomohiron907.Strecs3D
            ```
          files: Strecs3D.flatpak
